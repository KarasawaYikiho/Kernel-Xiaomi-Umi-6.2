name: Phase2 Port UMI (SO-TS -> 5+)

concurrency:
  group: phase2-umi-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "4.19 source repo"
        required: true
        default: "https://github.com/SO-TS/android_kernel_xiaomi_sm8250.git"
      source_branch:
        description: "4.19 source branch"
        required: true
        default: "android16-aptusitu"
      target_repo:
        description: "5+ target repo"
        required: true
        default: "https://github.com/yefxx/xiaomi-umi-linux-kernel.git"
      target_branch:
        description: "5+ target branch"
        required: true
        default: "master"
      device:
        description: "device codename"
        required: true
        default: "umi"
      bootimg_required_bytes:
        description: "target final boot.img size in bytes (default 128MiB, aligned with official umi ROM baseline)"
        required: false
        default: "134217728"
      bootimg_ramdisk_url:
        description: "optional URL to fetch ramdisk.cpio.gz (or a zip containing ramdisk payload) for release bootimg build"
        required: false
        default: "https://sourceforge.net/projects/skyloft-project/files/umi/lineage-20.0/kernel/skyloft-umi-20230108.zip/download"
      bootimg_prebuilt_url:
        description: "optional URL to fetch prebuilt boot.img (or a zip containing boot.img) when ramdisk is unavailable"
        required: false
        default: "https://sourceforge.net/projects/skyloft-project/files/umi/lineage-20.0/kernel/skyloft-umi-20230108.zip/download"

jobs:
  port-and-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      BOOTIMG_REQUIRED_BYTES: ${{ github.event.inputs.bootimg_required_bytes || '134217728' }}
      BOOTIMG_RAMDISK_URL: ${{ github.event.inputs.bootimg_ramdisk_url || '' }}
      BOOTIMG_PREBUILT_URL: ${{ github.event.inputs.bootimg_prebuilt_url || '' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PATH: /home/runner/.local/bin:/usr/local/bin:/usr/bin:/bin
    steps:
      - name: Checkout orchestrator repo
        uses: actions/checkout@v5

      - name: Install deps
        run: |
          chmod +x Tools/Porting/Install_Ci_Deps.sh
          ./Tools/Porting/Install_Ci_Deps.sh

      - name: Clone source and target
        run: |
          chmod +x Tools/Porting/Prepare_Phase2_Sources.sh
          ./Tools/Porting/Prepare_Phase2_Sources.sh \
            "${{ github.event.inputs.source_repo }}" \
            "${{ github.event.inputs.source_branch }}" \
            "${{ github.event.inputs.target_repo }}" \
            "${{ github.event.inputs.target_branch }}"

      - name: Check target kernel major
        run: |
          chmod +x Tools/Porting/Check_Target_Kernel_Version.sh
          ./Tools/Porting/Check_Target_Kernel_Version.sh

      - name: Normalize boot image size input
        shell: bash
        run: |
          chmod +x Tools/Porting/Normalize_Bootimg_Required_Bytes.sh
          ./Tools/Porting/Normalize_Bootimg_Required_Bytes.sh

      - name: Apply Phase2 migration
        run: |
          chmod +x Tools/Porting/Apply_Phase2_Migration.sh
          ./Tools/Porting/Apply_Phase2_Migration.sh "${{ github.event.inputs.device }}"

      - name: Build target kernel (attempt)
        env:
          ARCH: arm64
        run: |
          chmod +x Tools/Porting/Run_Phase2_Build.sh
          ./Tools/Porting/Run_Phase2_Build.sh "${{ github.event.inputs.device }}"

      - name: Collect artifacts + umi-focused package
        if: always()
        run: |
          chmod +x Tools/Porting/Collect_Phase2_Artifacts.sh
          ./Tools/Porting/Collect_Phase2_Artifacts.sh "${{ github.event.inputs.device }}"

      - name: Build AnyKernel candidate zip
        if: always()
        run: |
          chmod +x Tools/Porting/Build_Anykernel_Candidate.sh
          ./Tools/Porting/Build_Anykernel_Candidate.sh

      - name: Prepare release boot image (best effort)
        if: always()
        run: |
          chmod +x Tools/Porting/Prepare_Release_Bootimg.sh
          ./Tools/Porting/Prepare_Release_Bootimg.sh

      - name: Fetch inventory and analyze reference drivers
        if: always()
        run: |
          python3 Tools/Porting/Fetch_Inventory.py || true
          python3 Tools/Porting/Analyze_Reference_Drivers.py || true

      - name: Analyze official ROM package baseline
        if: always()
        run: |
          python3 Tools/Porting/Analyze_Official_Rom_Package.py || true

      - name: Validate AnyKernel candidate structure
        if: always()
        run: |
          python3 Tools/Porting/Validate_Anykernel_Candidate.py || true

      - name: Validate boot image constraints
        if: always()
        run: |
          python3 Tools/Porting/Validate_Boot_Image.py || true

      - name: Initialize driver integration manifest
        if: always()
        run: |
          python3 Tools/Porting/Init_Driver_Integration_Manifest.py || true

      - name: Sync driver integration manifest with ROM/reference backlog
        if: always()
        run: |
          python3 Tools/Porting/Sync_Driver_Integration_Manifest.py || true

      - name: Validate driver integration manifest
        if: always()
        run: |
          python3 Tools/Porting/Validate_Driver_Integration_Manifest.py || true

      - name: Build driver integration status
        if: always()
        run: |
          python3 Tools/Porting/Build_Driver_Integration_Status.py || true

      - name: Generate consolidated phase2 report
        if: always()
        run: |
          python3 Tools/Porting/Build_Phase2_Report.py || true

      - name: Write run metadata
        if: always()
        run: |
          chmod +x Tools/Porting/Write_Run_Meta.sh
          ./Tools/Porting/Write_Run_Meta.sh \
            "${{ github.run_id }}" \
            "${{ github.run_number }}" \
            "${{ github.sha }}" \
            "${{ github.ref }}" \
            "${{ github.event.inputs.device }}" \
            "${{ github.event.inputs.source_repo }}" \
            "${{ github.event.inputs.source_branch }}" \
            "${{ github.event.inputs.target_repo }}" \
            "${{ github.event.inputs.target_branch }}"

      - name: Run postprocess suite
        if: always()
        run: |
          chmod +x Tools/Porting/Run_Postprocess_Suite.sh
          ./Tools/Porting/Run_Postprocess_Suite.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: phase2-umi-${{ github.run_number }}
          path: artifacts/
