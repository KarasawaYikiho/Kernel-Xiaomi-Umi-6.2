name: ROM-Aligned SM8250 Port (Reference Baseline)

concurrency:
  group: rom-aligned-sm8250-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      device:
        description: "device codename"
        required: true
        default: "umi"

jobs:
  port-and-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      DEVICE: ${{ github.event.inputs.device || 'umi' }}
      OFFICIAL_BOOTIMG_PATH: ""
      BOOTIMG_RAMDISK_PATH: ""
      BOOTIMG_PREBUILT_PATH: ""
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PATH: /home/runner/.local/bin:/usr/local/bin:/usr/bin:/bin
    steps:
      - name: Checkout orchestrator repo
        uses: actions/checkout@v5

      - name: Install deps
        run: |
          chmod +x Tools/Porting/InstallCiDeps.sh
          ./Tools/Porting/InstallCiDeps.sh

      - name: Load port config
        run: |
          python3 Tools/Porting/ExportPortConfig.py >> "$GITHUB_ENV"

      - name: Validate device against SM8250 config
        run: |
          python3 Tools/Porting/ValidatePortDevice.py "$DEVICE"

      - name: Analyze official ROM package baseline
        if: always()
        run: |
          python3 Tools/Porting/AnalyzeOfficialRomPackage.py || true

      - name: Clone source and target
        run: |
          chmod +x Tools/Porting/PreparePhase2Sources.sh
          ./Tools/Porting/PreparePhase2Sources.sh \
            "$SOURCE_REPO" \
            "$SOURCE_BRANCH" \
            "$TARGET_REPO" \
            "$TARGET_BRANCH"

      - name: Check target kernel major
        run: |
          chmod +x Tools/Porting/CheckTargetKernelVersion.sh
          ./Tools/Porting/CheckTargetKernelVersion.sh

      - name: Normalize boot image size input
        shell: bash
        run: |
          chmod +x Tools/Porting/NormalizeBootimgRequiredBytes.sh
          ./Tools/Porting/NormalizeBootimgRequiredBytes.sh

      - name: Apply Phase2 migration
        run: |
          chmod +x Tools/Porting/ApplyPhase2Migration.sh
          ./Tools/Porting/ApplyPhase2Migration.sh "${{ github.event.inputs.device }}"

      - name: Build target kernel (attempt)
        env:
          ARCH: arm64
        run: |
          chmod +x Tools/Porting/RunPhase2Build.sh
          ./Tools/Porting/RunPhase2Build.sh "${{ github.event.inputs.device }}"

      - name: Collect artifacts + device package
        if: always()
        run: |
          chmod +x Tools/Porting/CollectPhase2Artifacts.sh
          ./Tools/Porting/CollectPhase2Artifacts.sh "${{ github.event.inputs.device }}"

      - name: Build AnyKernel candidate zip
        if: always()
        run: |
          chmod +x Tools/Porting/BuildAnykernelCandidate.sh
          ./Tools/Porting/BuildAnykernelCandidate.sh

      - name: Prepare release boot image (ROM-aware best effort)
        if: always()
        run: |
          chmod +x Tools/Porting/PrepareReleaseBootimg.sh
          ./Tools/Porting/PrepareReleaseBootimg.sh

      - name: Fetch inventory and analyze reference drivers
        if: always()
        run: |
          python3 Tools/Porting/FetchInventory.py || true
          python3 Tools/Porting/AnalyzeReferenceDrivers.py || true

      - name: Build driver integration evidence
        if: always()
        run: |
          python3 Tools/Porting/BuildDriverIntegrationEvidence.py || true

      - name: Validate AnyKernel candidate structure
        if: always()
        run: |
          python3 Tools/Porting/ValidateAnykernelCandidate.py || true

      - name: Validate boot image constraints
        if: always()
        run: |
          python3 Tools/Porting/ValidateBootImage.py || true

      - name: Initialize driver integration manifest
        if: always()
        run: |
          python3 Tools/Porting/InitDriverIntegrationManifest.py || true

      - name: Sync driver integration manifest with ROM/reference backlog
        if: always()
        run: |
          python3 Tools/Porting/SyncDriverIntegrationManifest.py || true

      - name: Validate driver integration manifest
        if: always()
        run: |
          python3 Tools/Porting/ValidateDriverIntegrationManifest.py || true

      - name: Initialize ROM alignment manifest
        if: always()
        run: |
          python3 Tools/Porting/InitRomAlignmentManifest.py || true

      - name: Sync ROM alignment manifest with artifact evidence
        if: always()
        run: |
          python3 Tools/Porting/SyncRomAlignmentManifest.py || true

      - name: Validate ROM alignment manifest
        if: always()
        run: |
          python3 Tools/Porting/ValidateRomAlignmentManifest.py || true

      - name: Build driver integration status
        if: always()
        run: |
          python3 Tools/Porting/BuildDriverIntegrationStatus.py || true

      - name: Build ROM alignment status
        if: always()
        run: |
          python3 Tools/Porting/BuildRomAlignmentStatus.py || true

      - name: Generate consolidated phase2 report
        if: always()
        run: |
          python3 Tools/Porting/BuildPhase2Report.py || true

      - name: Write run metadata
        if: always()
        run: |
          chmod +x Tools/Porting/WriteRunMeta.sh
          ./Tools/Porting/WriteRunMeta.sh \
            "${{ github.run_id }}" \
            "${{ github.run_number }}" \
            "${{ github.sha }}" \
            "${{ github.ref }}" \
            "${{ github.event.inputs.device }}" \
            "$SOURCE_REPO" \
            "$SOURCE_BRANCH" \
            "$TARGET_REPO" \
            "$TARGET_BRANCH"

      - name: Run postprocess suite
        if: always()
        run: |
          chmod +x Tools/Porting/RunPostprocessSuite.sh
          ./Tools/Porting/RunPostprocessSuite.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: rom-aligned-${{ env.DEVICE }}-${{ github.run_number }}
          path: artifacts/
