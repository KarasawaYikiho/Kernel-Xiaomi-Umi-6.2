name: Phase2 Port UMI (SO-TS -> 5+)

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "4.19 source repo"
        required: true
        default: "https://github.com/SO-TS/android_kernel_xiaomi_sm8250.git"
      source_branch:
        description: "4.19 source branch"
        required: true
        default: "android16-aptusitu"
      target_repo:
        description: "5+ target repo"
        required: true
        default: "https://github.com/yefxx/xiaomi-umi-linux-kernel.git"
      target_branch:
        description: "5+ target branch"
        required: true
        default: "master"
      device:
        description: "device codename"
        required: true
        default: "umi"

jobs:
  port-and-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout orchestrator repo
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git bc bison flex libssl-dev make libc6-dev libncurses5-dev \
            crossbuild-essential-arm64 ccache pahole lz4 xz-utils zstd python3 clang lld llvm zip

      - name: Clone source and target
        run: |
          git clone --depth=1 --branch "${{ github.event.inputs.source_branch }}" "${{ github.event.inputs.source_repo }}" source
          git clone --depth=1 --branch "${{ github.event.inputs.target_branch }}" "${{ github.event.inputs.target_repo }}" target

      - name: Check target kernel major
        run: |
          grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL)\s*=\s*' target/Makefile

      - name: Apply Phase2 migration
        run: |
          chmod +x tools/porting/phase2_apply.sh
          ./tools/porting/phase2_apply.sh "$PWD/source" "$PWD/target" "${{ github.event.inputs.device }}"

      - name: Build target kernel (attempt)
        env:
          ARCH: arm64
        run: |
          mkdir -p out
          make -C target O=$PWD/out LLVM=1 LLVM_IAS=1 "${{ github.event.inputs.device }}_defconfig"
          make -C target O=$PWD/out LLVM=1 LLVM_IAS=1 -j"$(nproc)" Image.gz dtbs modules

      - name: Collect artifacts + umi-focused package
        if: always()
        run: |
          mkdir -p artifacts/umi_bundle
          cp -v target/porting/phase2/summary.txt artifacts/ || true
          cp -v target/porting/phase2/copied_dts.txt artifacts/ || true
          cp -v target/porting/phase2/seed_dts.txt artifacts/ || true
          cp -v target/porting/phase2/included_dts.txt artifacts/ || true
          cp -v out/.config artifacts/ || true
          cp -v out/arch/arm64/boot/Image artifacts/ || true
          cp -v out/arch/arm64/boot/Image.gz artifacts/ || true

          # diagnostic lists
          find out/arch/arm64/boot/dts -type f \( -name '*.dtb' -o -name '*.dtbo' \) > artifacts/all_dtb_paths.txt || true

          # build manifest from migrated dts list (preferred)
          python3 tools/porting/build_dtb_manifest.py || true

          # pick paths by manifest first
          : > artifacts/umi_primary_dtb_paths.txt
          if [ -s artifacts/target_dtb_manifest.txt ]; then
            while IFS= read -r dtb; do
              [ -n "$dtb" ] || continue
              grep -E "/${dtb}$" artifacts/all_dtb_paths.txt >> artifacts/umi_primary_dtb_paths.txt || true
            done < artifacts/target_dtb_manifest.txt
          fi

          python3 tools/porting/dtb_postcheck.py || true
          python3 tools/porting/analyze_dtb_miss.py || true

          # fallback 1: strict umi/xiaomi/sm8250 path matching
          if [ ! -s artifacts/umi_primary_dtb_paths.txt ]; then
            grep -Ei '/.*(sm8250-xiaomi|umi-sm8250|xiaomi-sm8250-common).*(\.dtb|\.dtbo)$' artifacts/all_dtb_paths.txt \
              | grep -Eiv 'rumi|lumia|sony' > artifacts/umi_primary_dtb_paths.txt || true
          fi

          # fallback 2: keep it strict to avoid false positives from unrelated boards
          if [ ! -s artifacts/umi_primary_dtb_paths.txt ]; then
            grep -Ei '(sm8250-xiaomi|umi-sm8250|xiaomi-sm8250-common).*(\.dtb|\.dtbo)$' artifacts/all_dtb_paths.txt \
              | grep -Eiv 'rumi|lumia|sony|hdk|mtp' > artifacts/umi_primary_dtb_paths.txt || true
          fi

          cp -v out/arch/arm64/boot/Image artifacts/umi_bundle/ || true
          cp -v out/arch/arm64/boot/Image.gz artifacts/umi_bundle/ || true
          cp -v target/porting/phase2/summary.txt artifacts/umi_bundle/ || true

          dtb_count=0
          xiaomi_dtb_count=0
          if [ -s artifacts/umi_primary_dtb_paths.txt ]; then
            while IFS= read -r f; do
              [ -f "$f" ] || continue
              cp -v "$f" artifacts/ || true
              cp -v "$f" artifacts/umi_bundle/ || true
              dtb_count=$((dtb_count+1))
              echo "$f" | grep -Eiq 'xiaomi|umi|sm8250' && xiaomi_dtb_count=$((xiaomi_dtb_count+1)) || true
            done < artifacts/umi_primary_dtb_paths.txt
          fi

          flash_ready="no"
          if [ "$xiaomi_dtb_count" -ge 1 ] && [ -f out/arch/arm64/boot/Image ]; then
            flash_ready="candidate"
          fi

          {
            echo "device=${{ github.event.inputs.device }}"
            echo "umi_bundle_dtb_count=$dtb_count"
            echo "umi_bundle_xiaomi_dtb_count=$xiaomi_dtb_count"
            echo "flash_ready_hint=$flash_ready"
          } > artifacts/umi_bundle/pack-info.txt

          (cd artifacts/umi_bundle && zip -r ../phase2-umi-focused-package.zip .)
          python3 tools/porting/evaluate_artifact.py || true

      - name: Build AnyKernel candidate zip
        if: always()
        run: |
          mkdir -p artifacts
          anykernel_ok=no
          anykernel_has_imagegz=no
          anykernel_has_dtb=no
          anykernel_dtb_source=

          if [ -f out/arch/arm64/boot/Image.gz ]; then
            anykernel_has_imagegz=yes
            rm -rf anykernel3
            git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel3 || true
            if [ -d anykernel3 ]; then
              cp -v out/arch/arm64/boot/Image.gz anykernel3/Image.gz || true

              # Optional: include first matched umi-related dtb as dtb
              if [ -s artifacts/umi_primary_dtb_paths.txt ]; then
                first_dtb="$(head -n1 artifacts/umi_primary_dtb_paths.txt)"
                if [ -f "$first_dtb" ]; then
                  cp -v "$first_dtb" anykernel3/dtb || true
                  anykernel_has_dtb=yes
                  anykernel_dtb_source="$first_dtb"
                fi
              fi

              # Best-effort device hint
              sed -i 's/^device.name1=.*/device.name1=umi/' anykernel3/anykernel.sh || true

              if (cd anykernel3 && zip -r9 ../artifacts/AnyKernel3-umi-candidate.zip . -x ".git/*"); then
                anykernel_ok=yes
              fi
            fi
          fi

          {
            echo "anykernel_ok=$anykernel_ok"
            echo "has_imagegz=$anykernel_has_imagegz"
            echo "has_dtb=$anykernel_has_dtb"
            echo "dtb_source=$anykernel_dtb_source"
          } > artifacts/anykernel-info.txt

      - name: Generate consolidated phase2 report
        if: always()
        run: |
          python3 tools/porting/build_phase2_report.py || true

      - name: Write run metadata
        if: always()
        run: |
          mkdir -p artifacts
          {
            echo "workflow=phase2-port-umi"
            echo "run_id=${{ github.run_id }}"
            echo "run_number=${{ github.run_number }}"
            echo "sha=${{ github.sha }}"
            echo "ref=${{ github.ref }}"
            echo "device=${{ github.event.inputs.device }}"
            echo "source_repo=${{ github.event.inputs.source_repo }}"
            echo "source_branch=${{ github.event.inputs.source_branch }}"
            echo "target_repo=${{ github.event.inputs.target_repo }}"
            echo "target_branch=${{ github.event.inputs.target_branch }}"
          } > artifacts/run-meta.txt

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-umi-${{ github.run_number }}
          path: artifacts/
