name: Build SM8250 Kernel

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      device:
        description: "Target Device Codename"
        required: true
        default: "umi"
        type: choice
        options:
          - psyche
          - thyme
          - umi
          - munch
          - lmi
          - cmi
          - cas
          - apollo
          - alioth
          - elish
          - enuma
          - dagu
          - pipa
      ksu:
        description: "Enable KernelSU"
        required: true
        type: boolean
        default: false

jobs:
  build:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    env:
      DEVICE: ${{ github.event.inputs.device || 'umi' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v5

      - name: Cleanup disk
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl wget bison flex zip bc cpio libssl-dev ccache python-is-python3 clang llvm lld
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Load port config
        run: |
          python3 Porting/Tools/ExportPortConfig.py >> "$GITHUB_ENV"
          echo "KERNEL_DIR=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
          echo "OUT_DIR=$GITHUB_WORKSPACE/out" >> "$GITHUB_ENV"

      - name: Validate device against SM8250 config
        run: |
          python3 Porting/Tools/ValidatePortDevice.py "$DEVICE"

      - name: Setup cache (ccache)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache_mikernel
          key: kernel-ccache-${{ env.DEVICE }}-${{ github.run_id }}
          restore-keys: |
            kernel-ccache-${{ env.DEVICE }}-
            kernel-ccache-

      - name: Setup Toolchain (ZyC-Clang 15)
        run: |
          chmod +x Porting/Tools/SetupKernelToolchain.sh
          ./Porting/Tools/SetupKernelToolchain.sh

      - name: Build kernel
        run: |
          if [ "${{ github.event.inputs.ksu }}" = "true" ]; then
            echo "KernelSU enablement is not wired for the in-repo Kbuild flow yet" >&2
            exit 1
          fi
          mkdir -p artifacts
          find scripts arch tools -type f -exec sh -c 'case "$(head -c 2 "$1" 2>/dev/null)" in "#!") chmod +x "$1";; esac' sh {} \;
          set +e
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 umi_defconfig > artifacts/make-defconfig.log 2>&1
          rc1=$?
          make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 -j"$(nproc)" Image.gz > artifacts/make-build.log 2>&1
          rc2=$?
          set -e
          {
            echo "defconfig_rc=$rc1"
            echo "build_rc=$rc2"
          } > artifacts/build-exit.txt
          if [ "$rc1" -ne 0 ] || [ "$rc2" -ne 0 ]; then
            echo "::error title=Kernel build failed::defconfig_rc=$rc1 build_rc=$rc2; inspect uploaded make logs"
            exit 2
          fi

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p artifacts
          cp -v out/.config artifacts/ || true
          cp -v out/arch/arm64/boot/Image.gz artifacts/ || true
          find out/arch/arm64/boot/dts -name '*.dtb' -print -exec cp -v {} artifacts/ \; || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: Kernel-${{ env.DEVICE }}-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: error
