name: Build Xiaomi 10 (umi) Kernel > 5

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: "Kernel source repo (must contain umi_defconfig and kernel VERSION > 5)"
        required: true
      kernel_branch:
        description: "Kernel branch"
        required: true
        default: "master"

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git bc bison flex libssl-dev make libc6-dev libncurses5-dev \
            crossbuild-essential-arm64 ccache pahole lz4 xz-utils zstd \
            python3 python3-pip

      - name: Install LLVM/Clang
        run: |
          sudo apt-get install -y clang lld llvm
          clang --version

      - name: Clone kernel source (GitHub)
        run: |
          git clone --depth=1 --branch "${{ github.event.inputs.kernel_branch }}" \
            "${{ github.event.inputs.kernel_repo }}" kernel

      - name: Validate kernel source (version + umi defconfig)
        run: |
          grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL)\s*=\s*' kernel/Makefile
          KV_MAJOR=$(grep -E '^VERSION\s*=\s*' kernel/Makefile | awk '{print $3}')
          if [ -z "$KV_MAJOR" ] || [ "$KV_MAJOR" -le 5 ]; then
            echo "[ERROR] Kernel VERSION must be > 5, got: ${KV_MAJOR:-unknown}" >&2
            exit 1
          fi

          if [ ! -f kernel/arch/arm64/configs/umi_defconfig ] && [ ! -f kernel/arch/arm64/configs/vendor/umi_defconfig ]; then
            echo "[ERROR] umi_defconfig not found in source tree. Please provide a proper umi kernel repo/branch." >&2
            exit 1
          fi

      - name: Pick defconfig (strict for umi)
        id: defconfig
        run: |
          if [ -f kernel/arch/arm64/configs/umi_defconfig ]; then
            echo "name=umi_defconfig" >> "$GITHUB_OUTPUT"
          elif [ -f kernel/arch/arm64/configs/vendor/umi_defconfig ]; then
            echo "name=vendor/umi_defconfig" >> "$GITHUB_OUTPUT"
          else
            echo "[ERROR] umi_defconfig not found in source tree. This is not a proper umi kernel source." >&2
            exit 1
          fi

      - name: Build kernel
        env:
          ARCH: arm64
        run: |
          mkdir -p out
          make -C kernel O=$PWD/out LLVM=1 LLVM_IAS=1 "${{ steps.defconfig.outputs.name }}"
          make -C kernel O=$PWD/out LLVM=1 LLVM_IAS=1 -j"$(nproc)" Image.gz dtbs modules

      - name: Install modules to staging
        run: |
          mkdir -p modules_staging
          make -C kernel O=$PWD/out LLVM=1 LLVM_IAS=1 INSTALL_MOD_PATH=$PWD/modules_staging modules_install

      - name: Collect artifacts (umi-focused + full package)
        run: |
          mkdir -p artifacts/slim artifacts/full
          cp -v out/.config artifacts/slim/ || true
          cp -v out/arch/arm64/boot/Image.gz artifacts/slim/ || true
          cp -v out/arch/arm64/boot/Image artifacts/slim/ || true

          # Prefer umi/sm8250 dtb files; fallback to all dtb/dtbo if none matched
          found=0
          while IFS= read -r f; do
            cp -v "$f" artifacts/slim/
            found=1
          done < <(find out/arch/arm64/boot/dts -type f \( -name '*umi*.dtb' -o -name '*sm8250*.dtb' -o -name '*umi*.dtbo' -o -name '*sm8250*.dtbo' \) 2>/dev/null)

          if [ "$found" -eq 0 ]; then
            find out/arch/arm64/boot/dts -type f \( -name '*.dtb' -o -name '*.dtbo' \) -exec cp -v {} artifacts/slim/ \; || true
          fi

          # Full package (usually much larger, often near/over hundreds of MB)
          tar --zstd -cf artifacts/full/modules.tar.zst -C modules_staging . || true
          tar --zstd -cf artifacts/full/out.tar.zst -C out . || true

      - name: Upload slim artifacts
        uses: actions/upload-artifact@v4
        with:
          name: umi-kernel-slim-${{ github.run_number }}
          path: artifacts/slim/

      - name: Upload full artifacts
        uses: actions/upload-artifact@v4
        with:
          name: umi-kernel-full-${{ github.run_number }}
          path: artifacts/full/
