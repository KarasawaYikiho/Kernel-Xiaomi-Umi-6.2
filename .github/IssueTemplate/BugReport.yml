name: Bug report
description: Report a reproducible problem in workflows/scripts/docs
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include enough detail to reproduce.

  - type: input
    id: scope
    attributes:
      label: Scope
      description: Which part is affected?
      placeholder: "workflow / Porting/Tools / docs"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Trigger workflow ...
        2. Inputs ...
        3. See failure ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / artifacts
      description: Paste relevant lines from make logs or artifact files
      placeholder: "artifacts/build-error-summary.txt ..."

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues
          required: true
        - label: I attached minimal logs/artifacts needed to debug
          required: true
